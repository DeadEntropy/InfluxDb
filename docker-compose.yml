# One image, one default mode: `docker compose up` starts `prod` — the 10-min
# control loop that WRITES setpoints to the real ACs.
# Defaults to :latest; pin a specific build with e.g.
#   MPC_TAG=a1b2c3d docker compose up -d
#
# Config and model weights are volume-mounted (read-only) over the copies baked
# into the image, so they can be edited on the server without a rebuild:
#   - config/*.yaml edits are picked up by the scheduler on its next tick (hot-reload).
#   - new model/weights/ are picked up whenever the scheduler reloads config or restarts.
# One-time setup: copy thermal_control/config/ and thermal_control/model/weights/
# next to this file on the server (the mounts replace the baked-in copies).
services:
  prod:
    image: deadentropy/mpc-thermal:${MPC_TAG:-latest}
    command: ["python", "thermal_control/scheduler.py"]
    env_file: thermal_control/.env
    volumes:
      - ./thermal_control/logs:/app/thermal_control/logs
      - ./thermal_control/config:/app/thermal_control/config:ro
    # The live controller must come back after a crash or server reboot —
    # otherwise ACs could be left forced ON at 65°F with nothing to stop them.
    restart: unless-stopped
    # On stop, scheduler.py writes 76°F safe setpoints to all three ACs
    # (HTTP calls + read-back); the default 10s grace period is too tight.
    stop_grace_period: 30s

  # Read-only web dashboard — visualises the schedule, overrides and the live
  # decision log. Writes nothing; safe to run alongside prod.
  #   docker compose --profile dashboard up -d dashboard   → http://server:8111
  # Pin a build with MPC_TAG=<git-sha>; built from Dockerfile.dashboard.
  dashboard:
    image: deadentropy/mpc-dashboard:${MPC_TAG:-latest}
    ports:
      - "8111:5111"   # host 8111 (8050 is taken by account_reporting_ui)
    environment:
      # Read the same logs the prod scheduler writes, and the live config.
      MPC_LOGS_DIR: /app/thermal_control/logs
      MPC_CONFIG_DIR: /app/thermal_control/config
    volumes:
      - ./thermal_control/logs:/app/thermal_control/logs:ro
      - ./thermal_control/config:/app/thermal_control/config:ro
    restart: unless-stopped
    profiles: ["dashboard"]
