name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: thermal_control/requirements.txt

      - name: Install dependencies
        run: pip install -r thermal_control/requirements.txt

      - name: Run tests
        run: python -m pytest
