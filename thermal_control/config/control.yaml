mpc:
  horizon_steps: 18          # look-ahead window (18 × 10 min = 3 hours)
  tick_minutes: 10           # how often the MPC runs

  # Bang-bang setpoint values (°F)
  # Force ON : setpoint set below any realistic indoor temperature
  # Force OFF: setpoint set above any realistic indoor temperature
  setpoint_on_f:  65         # forces AC on  (sensor always > 65°F in Florida)
  setpoint_off_f: 84         # forces AC off (sensor never reaches 84°F indoors)

  # Energy penalty weight — small value that breaks ties by preferring
  # fewer ACs running when multiple combinations achieve equal comfort
  energy_weight: 0.05

  # Horizon discounting — down-weight far-future steps because model error
  # accumulates over the rollout: a breach predicted at t+3h is far less
  # certain than one at t+10min. Linear from discount_start at step 1 to
  # discount_end at the last step. The energy term is scaled by the mean
  # weight so the discomfort/energy balance is unaffected.
  # Set both to 1.0 to disable (also the default when the keys are absent).
  discount_start: 1.0
  discount_end: 0.25

  # Set true to fetch a 3-hour outdoor temperature forecast from Open-Meteo
  # and apply its *trend* to the MPC horizon: each step = current sensor
  # reading + the forecast's delta from now. The level always comes from the
  # local sensor (Open-Meteo's grid value is biased vs the pool soffit sensor
  # the model was trained on); the forecast only supplies the expected change,
  # e.g. evening cool-down. Set false to repeat the current reading flat.
  use_forecast: true

targets:
  # Comfort band in °F — penalty applied outside this range
  default:
    min_f: 75
    max_f: 77

  # ── Time-of-day schedule ──────────────────────────────────────────────────
  # Entries take effect at their time (24h local, America/New_York) and stay
  # active until the next entry. The list wraps midnight: the last entry
  # covers the gap back to the first entry's time.
  #
  # Priority: static per-room override (below) > schedule room > default
  # Wide band {min_f: 65, max_f: 85} = "don't care" — zero discomfort penalty
  # at any realistic indoor temperature, so the MPC ignores that room.
  schedule:
    - name: sleeping            # 22:00 → 06:00
      time: "22:00"
      rooms:
        # Bedrooms: tighter band — sleeping comfort matters more than default
        master_bedroom: {min_f: 74, max_f: 76}
        kids_bedroom:   {min_f: 74, max_f: 76}
        # bedroom_ac also covers anna_office — widen it so the AC isn't split
        # between sleeping people and an empty office
        anna_office:    {min_f: 65, max_f: 85}
        # living_ac zone: all unoccupied at night → let living_ac go quiet
        dining_room:    {min_f: 65, max_f: 77}
        kitchen:        {min_f: 65, max_f: 85}
        family_room:    {min_f: 65, max_f: 77}
        # extension_ac zone: both rooms empty at night → extension_ac goes off
        tv_room:        {min_f: 65, max_f: 77}
        nicolas_office: {min_f: 65, max_f: 85}

    - name: daytime             # 06:00 → 15:00
      time: "06:00"
      rooms: 
        nicolas_office: {min_f: 74, max_f: 76}

    - name: early afternoon         # 15:00 → 16:30
      time: "15:00"
      rooms: 
        nicolas_office: {min_f: 65, max_f: 85}

    - name: late afternoon         # 16:30 → 22:00
      time: "16:30"
      rooms: {}

  # ── Static per-room overrides (optional, beats schedule at all times) ─────
  # nicolas_office:
  #   min_f: 73
  #   max_f: 76

ac_power:
  # Watts when actively cooling (for energy penalty scaling).
  # Measured Jun 4-11 2026 (ac_power_status_check.py): steady-state median
  # circuit power while hvac_action=cooling. living/bedroom are the dedicated
  # compressor+air-handler circuits (idle ~0 W); extension is metered via the
  # two sub-panels, so its ~100 W idle baseline of other loads is subtracted.
  bedroom_ac:   1600
  living_ac:    2400
  extension_ac: 1950
