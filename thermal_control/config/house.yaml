rooms:
  # ── Bedroom zone ──────────────────────────────────────────────────────────
  # sensor data source column: "Master Bedroom Temperature"
  - id: master_bedroom
    sensor_entity: sensor.master_bedroom_temperature
    csv_column: "Master Bedroom Temperature"
    exterior_walls: true
    # Manual override (items 7/7b): per-room generic_thermostat climate entity.
    # Its target temperature is the user-facing UPPER bound of the comfort band;
    # the scheduler keeps it synced to the schedule, treats a user edit as a
    # control.mpc.override_duration_minutes override, then reverts it.
    thermostat_entity: climate.mpc_master_bedroom

  # sensor data source column: "Kids Bedroom Temperature"
  - id: kids_bedroom
    sensor_entity: sensor.kids_bedroom_temperature
    csv_column: "Kids Bedroom Temperature"
    exterior_walls: true
    thermostat_entity: climate.mpc_kids_bedroom

  # NO sensor in extracted data — excluded from DAG targets; covered by bedroom_ac
  - id: kids_playroom
    sensor_entity: null
    csv_column: null
    exterior_walls: true
    note: no sensor data available; excluded from thermal model

  # sensor data source column: "Anna Office Temperature"
  - id: anna_office
    sensor_entity: sensor.anna_office_temperature
    csv_column: "Anna Office Temperature"
    exterior_walls: true
    thermostat_entity: climate.mpc_anna_office

  # master_bath excluded: shower activity causes large temperature spikes
  # that would corrupt the thermal model; not a comfort target anyway.

  # NO sensor in extracted data — excluded from DAG targets; covered by bedroom_ac
  - id: kids_bath
    sensor_entity: null
    csv_column: null
    exterior_walls: true
    note: no sensor data available; excluded from thermal model

  # NO sensor in extracted data — excluded from DAG targets; covered by bedroom_ac
  - id: anna_bath
    sensor_entity: null
    csv_column: null
    exterior_walls: true
    note: no sensor data available; excluded from thermal model

  # ── Living zone ───────────────────────────────────────────────────────────
  # sensor data source column: "Dining Room Temperature"
  # Also the sensor_room for bedroom_ac — critical for switching model
  - id: dining_room
    sensor_entity: sensor.dining_room_temperature
    csv_column: "Dining Room Temperature"
    exterior_walls: true
    thermostat_entity: climate.mpc_dining_room

  # NO sensor in extracted data
  - id: entrance
    sensor_entity: null
    csv_column: null
    exterior_walls: true
    note: no sensor data available; excluded from thermal model

  # sensor data source column: "Kitchen Temperature"
  # Also the sensor_room for living_ac — critical for switching model
  - id: kitchen
    sensor_entity: sensor.kitchen_temperature
    csv_column: "Kitchen Temperature"
    exterior_walls: true
    thermostat_entity: climate.mpc_kitchen

  # sensor data source column: "Family Room Temperature"
  - id: family_room
    sensor_entity: sensor.family_room_temperature
    csv_column: "Family Room Temperature"
    exterior_walls: true
    thermostat_entity: climate.mpc_family_room

  # ── Extension zone ────────────────────────────────────────────────────────
  # sensor data source column: "Tv Room Temperature"
  # Also the sensor_room for extension_ac — critical for switching model
  - id: tv_room
    sensor_entity: sensor.tv_room_temperature
    csv_column: "Tv Room Temperature"
    exterior_walls: true
    thermostat_entity: climate.mpc_tv_room

  # sensor data source column: "Nicolas Office Temperature"
  - id: nicolas_office
    sensor_entity: sensor.nicolas_office_temperature
    csv_column: "Nicolas Office Temperature"
    exterior_walls: true
    # Presence proxy (item 9): on = occupied. When off, the MPC drops this room
    # to the wide 65–85°F "don't care" band so an empty office isn't cooled.
    # Rooms without presence_entity are always treated as occupied.
    presence_entity: binary_sensor.presence_nicolas_office
    thermostat_entity: climate.mpc_nicolas_office

  # NO sensor in extracted data
  - id: nicolas_bath
    sensor_entity: null
    csv_column: null
    exterior_walls: true
    note: no sensor data available; excluded from thermal model

adjacency:
  # Extension ↔ Living
  - [tv_room, family_room]
  # Living zone internal
  - [family_room, kitchen]
  - [kitchen, dining_room]
  - [dining_room, entrance]
  - [entrance, kitchen]
  # anna_office is cooled by bedroom_ac but open to the living zone
  - [anna_office, kitchen]
  - [anna_office, family_room]

ac_units:
  # ── Bedroom AC ────────────────────────────────────────────────────────────
  # ⚠️  Controller sensor is in dining_room, which is cooled by living_ac.
  #     This creates cross-zone entanglement: bedroom_ac switching is driven
  #     by dining_room temperature, itself influenced by living_ac.
  - id: bedroom_ac
    ha_entity_id: bedroom_thermostat
    climate_entity: climate.bedroom_thermostat
    ac_sensor_entity: sensor.bedroom_thermostat_air_temperature
    sensor_room: dining_room
    # Kill switch (item 10): 'on' = MPC stops writing to this unit entirely,
    # leaving whatever mode/setpoint is set (manually or by the unit itself)
    # untouched. Rooms with no kill_entity are always MPC-controlled.
    kill_entity: input_boolean.mpc_kill_bedroom_ac
    covers:
      - master_bedroom
      - kids_bedroom
      - anna_office
      # master_bath excluded (shower distortion)
      # kids_playroom, kids_bath, anna_bath excluded (no sensor)
      # laundry_room excluded (dryer causes severe temperature distortion)

  # ── Living AC ─────────────────────────────────────────────────────────────
  - id: living_ac
    ha_entity_id: thermostat_central
    climate_entity: climate.thermostat_central
    ac_sensor_entity: sensor.thermostat_central_air_temperature_2
    sensor_room: kitchen
    kill_entity: input_boolean.mpc_kill_living_ac
    covers:
      - dining_room
      - kitchen
      - family_room
      # entrance excluded (no sensor)

  # ── Extension AC ──────────────────────────────────────────────────────────
  - id: extension_ac
    ha_entity_id: thermostat_extension
    climate_entity: climate.thermostat_extension
    ac_sensor_entity: sensor.thermostat_extension_air_temperature_2
    sensor_room: tv_room
    kill_entity: input_boolean.mpc_kill_extension_ac
    covers:
      - tv_room
      - nicolas_office
      # nicolas_bath excluded (no sensor)

outdoor_sensor: sensor.pool_temperature
# Outdoor temperature is measured by the pool sensor mounted under the
# house soffit. CSV column: "Pool Temp". Used as T_outdoor in the DAG.
outdoor_csv_column: "Pool Temp"

location:
  lat: 26.0765
  lon: -80.2521
  timezone: America/New_York

# ── Data source files ─────────────────────────────────────────────────────
data:
  room_temps_csv: homeassistant_temp.csv
  ac_states_csv: homeassistant_states.csv
  # Room temp CSV is at 5-minute resolution; AC states are event-driven.
  # Both will be resampled to 10-minute intervals in preprocess.py.
  # Filter out sentinel value: temps <= -10°F are Zigbee dropout artifacts.
  sentinel_filter_f: -10.0
  overlap_start: "2025-05-31"
  overlap_end: "2026-06-08"

# ── Pre-implementation sensor checks (completed) ──────────────────────────
# All three AC sensors (bedroom_thermostat, thermostat_central,
# thermostat_extension) report in whole °F only — non-zero diffs are all
# multiples of 1°F. Sigmoid relaxation is inappropriate; use MILP.
#
# Hysteresis: ~96% of both turn-on and turn-off transitions occur at
# delta = 0 (sensor == setpoint). Residual non-zero values are timing
# artifacts from event-log lag. No meaningful deadband detected.
sensor_resolution:
  unit: fahrenheit
  rounded: true
  setpoint_step_f: 1
  hysteresis_f: 0
